<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grid Telemetry</title>
<link rel="stylesheet" href="/static/vendor/uPlot.min.css" />
<style>
  :root {
    --bg:        #0b0f14;
    --panel:     #121822;
    --panel-2:   #0e131b;
    --line:      #1f2937;
    --ink:       #e6edf3;
    --ink-dim:   #7d8da1;
    --ink-faint: #4b596b;
    --ok:        #3fb950;
    --warn:      #d29922;
    --grid:      #1a2230;
    /* per-channel accents, assigned in order */
    --c0: #2dd4bf; /* frequency  */
    --c1: #a78bfa; /* voltage    */
    --c2: #f0b429; /* power      */
    --c3: #4ade80; /* pf         */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace; }

  header {
    display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--bg));
  }
  header h1 {
    font-size: 14px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; margin: 0; color: var(--ink);
  }
  header .sub { font-size: 12px; color: var(--ink-dim); letter-spacing: .04em; }
  .spacer { flex: 1; }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: .06em; color: var(--ink-dim);
  }
  .mode-toggle {
    display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
  }
  .mode-toggle button {
    font: inherit; font-size: 12px; letter-spacing: .04em; padding: 6px 12px;
    background: var(--panel-2); color: var(--ink-dim); border: none; cursor: pointer;
  }
  .mode-toggle button.active { background: var(--ink-faint); color: var(--bg); font-weight: 600; }
  .batch-controls {
    display: none; align-items: center; gap: 10px; font-size: 12px; color: var(--ink-dim);
    padding: 10px 24px; border-bottom: 1px solid var(--line);
  }
  .batch-controls.show { display: flex; }
  .batch-controls label { display: inline-flex; align-items: center; gap: 6px; }
  .batch-controls input {
    width: 70px; font: inherit; font-size: 12px; background: var(--panel-2);
    color: var(--ink); border: 1px solid var(--line); border-radius: 4px; padding: 4px 6px;
  }
  .batch-controls button {
    font: inherit; font-size: 12px; font-weight: 600; letter-spacing: .04em;
    background: var(--ok); color: #04210b; border: none; border-radius: 4px;
    padding: 6px 14px; cursor: pointer;
  }
  .batch-controls .err { color: var(--warn); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); }
  .dot.live { background: var(--ok); box-shadow: 0 0 0 0 rgba(63,185,80,.5); animation: pulse 2s infinite; }
  .dot.down { background: var(--warn); animation: none; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(63,185,80,.45); }
    70%  { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
  }

  main {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    padding: 20px 24px 28px;
    max-width: 1400px; margin: 0 auto;
  }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 16px 8px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
  }
  .phead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .label { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-dim); }
  .nominal { font-size: 11px; color: var(--ink-faint); margin-top: 2px; letter-spacing: .03em; }

  .readout { text-align: right; line-height: 1; }
  .value { font-size: 30px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; }
  .value .unit { font-size: 14px; color: var(--ink-dim); font-weight: 500; margin-left: 4px; }
  .delta { font-size: 12px; margin-top: 6px; color: var(--ink-dim); }
  .delta.warn { color: var(--warn); }
  .health {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok); margin-right: 6px; vertical-align: middle;
  }
  .health.warn { background: var(--warn); }

  .chart { margin-top: 10px; }
  /* uPlot dark theme tweaks */
  .uplot, .u-legend { color: var(--ink-dim); font-family: ui-monospace, Menlo, monospace; }
  .u-legend { font-size: 11px; }
  .uplot .u-axis { color: var(--ink-faint); }

  footer {
    padding: 0 24px 24px; max-width: 1400px; margin: 0 auto;
    font-size: 11px; color: var(--ink-faint); letter-spacing: .03em;
  }
</style>
</head>
<body>
  <header>
    <h1>Grid Telemetry</h1>
    <span class="sub mono" id="clock" style="font-weight:700; color:var(--ink);">--:--:--</span>
    <div class="spacer"></div>
    <div class="mode-toggle">
      <button id="modeLive" class="active">Live (1&nbsp;Hz)</button>
      <button id="modeBatch">Batch (CSV)</button>
    </div>
    <span class="status"><span class="dot" id="dot"></span><span id="statusText">connecting…</span></span>
  </header>

  <div class="batch-controls" id="batchControls">
    <label>Points on screen <input type="number" id="batchPoints" value="60" min="1" max="10000" /></label>
    <label>Refresh interval (s) <input type="number" id="batchRefresh" value="1" min="0.25" max="3600" step="0.25" /></label>
    <label>Reporting rate (pts/s) <input type="number" id="batchReporting" value="2" min="1" max="1000" /></label>
    <button id="batchStart">Start</button>
    <span class="err" id="batchErr"></span>
  </div>

  <main id="grid"></main>

  <footer>
    Synthetic data &middot; <span id="feedDesc">1&nbsp;Hz push (SSE)</span> &middot; <span id="window">last 10&nbsp;pts</span> window &middot;
    charts auto-range tightly around each channel's nominal so small moves stay visible.
  </footer>

  <script src="/static/vendor/uPlot.iife.min.js"></script>
  <script>
  (async function () {
    let WINDOW = 10;                // points kept on screen; live=10, batch="points on screen" field
    const ACCENTS = ["--c0", "--c1", "--c2", "--c3"];
    const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

    // 1) Learn what channels exist (single source of truth lives on the server).
    const channels = await fetch("/channels").then((r) => r.json());

    // Per-channel runtime state.
    const panels = {};         // key -> { plot, valueEl, deltaEl, healthEl }
    const xs = [];             // shared timestamps (seconds)
    const ys = {};             // key -> array of values
    const batchStarts = [];    // batch-mode: timestamps where each CSV batch begins
    channels.forEach((c) => { ys[c.key] = []; });

    // uPlot plugin: in batch mode, draw a vertical divider at the start of each
    // CSV batch so it's clear where one file's data ends and the next begins.
    function batchDividerPlugin() {
      return {
        hooks: {
          draw: (u) => {
            if (mode !== "batch" || batchStarts.length === 0) return;
            const ctx = u.ctx;
            const { left, top, width, height } = u.bbox;
            const dpr = u.pxRatio || window.devicePixelRatio || 1;
            ctx.save();
            ctx.strokeStyle = "rgba(230, 237, 243, 0.7)";
            ctx.lineWidth = 2 * dpr;
            ctx.setLineDash([6 * dpr, 5 * dpr]);
            batchStarts.forEach((t) => {
              if (xs.length && t <= xs[0]) return; // skip divider glued to y-axis
              const x = Math.round(u.valToPos(t, "x", true)) + 0.5;
              if (x < left || x > left + width) return;
              ctx.beginPath();
              ctx.moveTo(x, top);
              ctx.lineTo(x, top + height);
              ctx.stroke();
            });
            ctx.restore();
          },
        },
      };
    }

    // 2) Build a panel + chart per channel.
    const grid = document.getElementById("grid");
    channels.forEach((c, i) => {
      const accent = cssVar(ACCENTS[i % ACCENTS.length]);

      const panel = document.createElement("section");
      panel.className = "panel";
      panel.style.setProperty("--accent", accent);
      panel.innerHTML = `
        <div class="phead">
          <div>
            <div class="label">${c.label}</div>
            <div class="nominal mono">nominal ${c.nominal.toFixed(c.precision)} ${c.unit}</div>
          </div>
          <div class="readout">
            <div class="value mono"><span data-v>—</span><span class="unit">${c.unit}</span></div>
            <div class="delta mono"><span class="health" data-h></span><span data-d>Δ —</span></div>
          </div>
        </div>
        <div class="chart" data-chart></div>`;
      grid.appendChild(panel);

      const chartEl = panel.querySelector("[data-chart]");
      const width = chartEl.clientWidth || 600;

      const opts = {
        width: width,
        height: 150,
        cursor: { y: false, points: { size: 5 } },
        legend: { show: false },
        plugins: [batchDividerPlugin()],
        scales: { x: { time: true }, y: { range: [0, 50] } },
        axes: [
          {
            stroke: cssVar("--ink-faint"),
            grid: { stroke: cssVar("--grid"), width: 1 },
            ticks: { stroke: cssVar("--grid") },
            space: 30,
            values: (u, splits) => {
              let prevMin = null;
              return splits.map(v => {
                if (v == null) return "";
                const d = new Date(v * 1000);
                const min = d.getHours() * 60 + d.getMinutes();
                const ss = String(d.getSeconds()).padStart(2, "0");
                if (min !== prevMin) {
                  prevMin = min;
                  const hh = String(d.getHours()).padStart(2, "0");
                  const mm = String(d.getMinutes()).padStart(2, "0");
                  return `${hh}:${mm}`;
                }
                return `:${ss}`;
              });
            },
          },
          {
            stroke: cssVar("--ink-faint"),
            grid: { stroke: cssVar("--grid"), width: 1 },
            ticks: { stroke: cssVar("--grid") },
            size: 56,
            splits: () => [0, 25, 50],
            values: (u, ticks) => ticks.map((v) => v.toFixed(0)),
          },
        ],
        series: [
          {},
          { stroke: accent, width: 1.6, points: { show: false } },
          {
            // nominal reference line (constant)
            stroke: cssVar("--ink-faint"),
            width: 1,
            dash: [4, 5],
            points: { show: false },
          },
        ],
      };

      const plot = new uPlot(opts, [[], [], []], chartEl);

      panels[c.key] = {
        cfg: c,
        plot: plot,
        valueEl: panel.querySelector("[data-v]"),
        deltaEl: panel.querySelector("[data-d]"),
        deltaWrap: panel.querySelector(".delta"),
        healthEl: panel.querySelector("[data-h]"),
        chartEl: chartEl,
      };
    });

    // Keep charts sized to their container on window resize.
    window.addEventListener("resize", () => {
      Object.values(panels).forEach((p) => {
        p.plot.setSize({ width: p.chartEl.clientWidth || 600, height: 150 });
      });
    });

    // 3) Render one tick of data into every panel.
    function render() {
      const x = xs;
      channels.forEach((c) => {
        const p = panels[c.key];
        const y = ys[c.key];
        const nominalLine = new Array(x.length).fill(c.nominal);
        p.plot.setData([x, y, nominalLine]);

        const v = y[y.length - 1];
        if (v == null) return;
        const dev = v - c.nominal;
        const warned = v < c.warn_low || v > c.warn_high;

        p.valueEl.textContent = v.toFixed(c.precision);
        const sign = dev >= 0 ? "+" : "−";
        p.deltaEl.textContent = `Δ ${sign}${Math.abs(dev).toFixed(c.precision)} ${c.unit}`.trim();
        p.deltaWrap.classList.toggle("warn", warned);
        p.healthEl.classList.toggle("warn", warned);
      });
    }

    // 4) Feed sources: live (SSE, 1 point/sec) or batch (poll a CSV file on
    // a schedule). Only one is active at a time; switching modes resets state.
    // See DECISIONS.md D8.
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const clock = document.getElementById("clock");
    const windowEl = document.getElementById("window");
    const feedDescEl = document.getElementById("feedDesc");

    let mode = "live";
    let liveSource = null;
    let batchTimer = null;
    let lastBatchSeq = null;

    function setStatus(state) {
      dot.className = "dot " + state;
      statusText.textContent =
        state === "live" ? (mode === "live" ? "live · 1 Hz" : "live · polling") :
        state === "down" ? "reconnecting…" : "connecting…";
    }

    function resetData() {
      xs.length = 0;
      batchStarts.length = 0;
      channels.forEach((c) => { ys[c.key].length = 0; });
      render();
    }

    function updateClock(t) {
      clock.textContent = new Date(t * 1000).toLocaleTimeString([], { hour12: false });
    }

    function pushSample(sample) {
      xs.push(sample.t);
      channels.forEach((c) => ys[c.key].push(sample[c.key]));
    }

    function trimTo(limit) {
      while (xs.length > limit) {
        xs.shift();
        channels.forEach((c) => ys[c.key].shift());
      }
    }

    // -- Live mode (SSE, 1 Hz) --------------------------------------------
    function stopLive() {
      if (liveSource) { liveSource.close(); liveSource = null; }
    }

    function startLive() {
      mode = "live";
      WINDOW = 10;
      resetData();
      windowEl.textContent = "last " + WINDOW + " sec";
      feedDescEl.textContent = "1 Hz push (SSE)";
      setStatus("connecting");

      liveSource = new EventSource("/stream");
      liveSource.onopen = () => setStatus("live");
      liveSource.onerror = () => setStatus("down");
      liveSource.onmessage = (ev) => {
        setStatus("live");
        const s = JSON.parse(ev.data);
        pushSample(s);
        trimTo(WINDOW);
        updateClock(s.t);
        render();
      };
    }

    // -- Batch mode (poll /batch/latest, whole-window redraw per batch) ---
    function stopBatch() {
      if (batchTimer) { clearInterval(batchTimer); batchTimer = null; }
      lastBatchSeq = null;
      fetch("/batch/stop", { method: "POST" }).catch(() => {});
    }

    function parseCsv(text) {
      const lines = text.trim().split("\n");
      const header = lines[0].split(",");
      return lines.slice(1).map((line) => {
        const cells = line.split(",");
        const row = {};
        header.forEach((h, i) => { row[h] = parseFloat(cells[i]); });
        return row;
      });
    }

    async function pollBatch() {
      try {
        const res = await fetch("/batch/latest");
        if (!res.ok) { setStatus("down"); return; }
        const seq = res.headers.get("X-Batch-Seq");
        if (seq === lastBatchSeq) return; // no new batch yet, skip re-render
        lastBatchSeq = seq;

        const rows = parseCsv(await res.text());
        if (rows.length) batchStarts.push(rows[0].t); // mark where this CSV begins
        rows.forEach((r) => pushSample(r));
        trimTo(WINDOW);
        while (batchStarts.length && xs.length && batchStarts[0] < xs[0]) {
          batchStarts.shift(); // drop boundaries scrolled off the left edge
        }

        const last = rows[rows.length - 1];
        if (last) updateClock(last.t);
        setStatus("live");
        render();
      } catch (e) {
        setStatus("down");
      }
    }

    async function startBatch(points, refresh, reporting) {
      mode = "batch";
      WINDOW = points;                 // window is now a direct input, not 2×rows
      lastBatchSeq = null;
      resetData();
      windowEl.textContent = "last " + WINDOW + " pts";
      feedDescEl.textContent = reporting + " pts/s, refresh " + refresh + "s";
      setStatus("connecting");

      await fetch(`/batch/start?points=${points}&refresh=${refresh}&reporting=${reporting}`, { method: "POST" });
      await pollBatch();
      if (batchTimer) clearInterval(batchTimer);
      batchTimer = setInterval(pollBatch, refresh * 1000);
    }

    // -- Mode toggle + batch controls wiring -------------------------------
    const modeLiveBtn = document.getElementById("modeLive");
    const modeBatchBtn = document.getElementById("modeBatch");
    const batchControls = document.getElementById("batchControls");
    const batchErr = document.getElementById("batchErr");

    modeLiveBtn.addEventListener("click", () => {
      if (mode === "live") return;
      modeLiveBtn.classList.add("active");
      modeBatchBtn.classList.remove("active");
      batchControls.classList.remove("show");
      stopBatch();
      startLive();
    });

    modeBatchBtn.addEventListener("click", () => {
      if (mode === "batch") return;
      modeBatchBtn.classList.add("active");
      modeLiveBtn.classList.remove("active");
      batchControls.classList.add("show");
      stopLive();
      mode = "batch";
      resetData();
      setStatus("connecting");
      statusText.textContent = "waiting to start…";
      feedDescEl.textContent = "CSV batch (configure & press Start)";
    });

    document.getElementById("batchStart").addEventListener("click", () => {
      const points = parseInt(document.getElementById("batchPoints").value, 10);
      const refresh = parseFloat(document.getElementById("batchRefresh").value);
      const reporting = parseInt(document.getElementById("batchReporting").value, 10);
      batchErr.textContent = "";

      if (!Number.isInteger(reporting) || reporting < 1 || reporting > 1000) {
        batchErr.textContent = "reporting must be 1-1000 pts/s";
        return;
      }
      const minRefresh = Math.max(0.25, 1 / reporting);
      if (!(refresh >= minRefresh) || refresh > 3600) {
        batchErr.textContent = "refresh must be " + (Math.round(minRefresh * 1000) / 1000) + "-3600s (can't beat reporting rate)";
        return;
      }
      const batch = Math.ceil(reporting * refresh);
      if (batch > 10000) {
        batchErr.textContent = "reporting × refresh = " + batch + " rows/CSV exceeds 10000; lower reporting or refresh";
        return;
      }
      if (!Number.isInteger(points) || points < batch || points > 10000) {
        batchErr.textContent = "points must be " + batch + "-10000 (≥ one batch)";
        return;
      }
      startBatch(points, refresh, reporting);
    });

    // 5) Kick off in live mode.
    startLive();
  })();
  </script>
</body>
</html>
